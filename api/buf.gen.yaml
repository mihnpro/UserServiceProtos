version: v1
managed:
  enabled: true
  go_package_prefix:
    default:  github.com/code-with-the-boys/UserService/gen/go/userServicepb
plugins:
  # Go plugin
  - name: go
    out: gen/go
    opt: paths=source_relative
  
  # gRPC Go plugin  
  - name: go-grpc
    out: gen/go
    opt: 
      - paths=source_relative
      - require_unimplemented_servers=false