version: v1
managed:
  enabled: true
  go_package_prefix:
    default:  github.com/code-with-the-boys/UserService/gen/go/userServicepb
plugins:
  # Go plugin
  - name: go
    out: gen/go
    opt: paths=source_relative
  
  # gRPC Go plugin  
  - name: go-grpc
    out: gen/go
    opt: 
      - paths=source_relative
      - require_unimplemented_servers=false
  
  # gRPC Gateway plugin
  - name: grpc-gateway
    out: gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  
  # OpenAPI v2 plugin
  - name: openapiv2
    out: gen/openapiv2
    opt:
      - allow_merge=true
      - merge_file_name=user_service