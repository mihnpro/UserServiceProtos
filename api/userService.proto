syntax = "proto3";

package userService;

option go_package = "github.com/code-with-the-boys/UserService/gen/go/userServicepb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Единый сервис для управления пользователями
service UserService {
    // Auth operations
    // Регистрация нового пользователя в системе
    rpc SignUp(SignUpRequest) returns (SignUpResponse);
    
    // Аутентификация пользователя и получение токенов доступа
    rpc Login(LoginRequest) returns (LoginResponse);
    
    // Обновление пары токенов доступа с использованием refresh token
    rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse);
    
    // Завершение сессии пользователя и инвалидация refresh token
    rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
    
    // User operations
    // Получение информации о пользователе по его идентификатору
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    
    // Обновление данных пользователя
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
    
    // Удаление пользователя из системы (мягкое или жесткое удаление)
    rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
    
    // Profile operations
    // Создание профиля пользователя
    rpc CreateUserProfile(CreateUserProfileRequest) returns (UserProfile);
    
    // Получение профиля пользователя
    rpc GetUserProfile(GetUserProfileRequest) returns (UserProfile);
    
    // Обновление профиля пользователя
    rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserProfile);
    
    // Удаление профиля пользователя
    rpc DeleteUserProfile(DeleteUserProfileRequest) returns (google.protobuf.Empty);
    
    // Settings operations
    // Получение настроек пользователя
    rpc GetUserSettings(GetUserSettingsRequest) returns (UserSettings);
    
    // Обновление настроек пользователя
    rpc UpdateUserSettings(UpdateUserSettingsRequest) returns (UserSettings);

    // Получение текущего id пользователя
    rpc GetCurrentUserID(google.protobuf.Empty) returns (CurrentUserIDResponse);
}

// Enums
// Статус подписки пользователя
enum SubscriptionStatus {
    SUBSCRIPTION_STATUS_UNSPECIFIED = 0; // Статус не указан
    SUBSCRIPTION_STATUS_ACTIVE = 1;      // Подписка активна
    SUBSCRIPTION_STATUS_INACTIVE = 2;    // Подписка неактивна
    SUBSCRIPTION_STATUS_EXPIRED = 3;     // Срок подписки истек
    SUBSCRIPTION_STATUS_TRIAL = 4;       // Пробный период
    SUBSCRIPTION_STATUS_NONE = 5;        // Нет подписки
}

// Пол пользователя
enum Gender {
    GENDER_UNSPECIFIED = 0; // Пол не указан
    GENDER_MALE = 1;        // Мужской
    GENDER_FEMALE = 2;      // Женский
    GENDER_OTHER = 3;       // Другой
}

// Фитнес цель пользователя
enum FitnessGoal {
    FITNESS_GOAL_UNSPECIFIED = 0;      // Цель не указана
    FITNESS_GOAL_WEIGHT_LOSS = 1;      // Похудение
    FITNESS_GOAL_MUSCLE_GAIN = 2;      // Набор мышечной массы
    FITNESS_GOAL_ENDURANCE = 3;        // Развитие выносливости
    FITNESS_GOAL_GENERAL_HEALTH = 4;   // Общее оздоровление
    FITNESS_GOAL_MAINTENANCE = 5;      // Поддержание формы
}

// Уровень опыта пользователя в фитнесе
enum ExperienceLevel {
    EXPERIENCE_LEVEL_UNSPECIFIED = 0;      // Уровень не указан
    EXPERIENCE_LEVEL_BEGINNER = 1;         // Начинающий
    EXPERIENCE_LEVEL_INTERMEDIATE = 2;     // Средний уровень
    EXPERIENCE_LEVEL_ADVANCED = 3;         // Продвинутый
    EXPERIENCE_LEVEL_PROFESSIONAL = 4;     // Профессиональный
}

// Уровень приватности пользователя
enum PrivacyLevel {
    PRIVACY_LEVEL_UNSPECIFIED = 0; // Уровень не указан
    PRIVACY_LEVEL_PUBLIC = 1;      // Публичный профиль
    PRIVACY_LEVEL_PRIVATE = 2;     // Приватный профиль
    PRIVACY_LEVEL_FRIENDS = 3;     // Доступно только друзьям
    PRIVACY_LEVEL_ONLY_ME = 4;     // Только я
}


// Текущий id пользока
message CurrentUserIDResponse {
    string user_id = 1;
}

// Auth messages
// Запрос на регистрацию нового пользователя
message SignUpRequest {
    string email = 1;                // Email пользователя (обязательное поле)
    string password = 2;             // Пароль пользователя (минимум 6 символов)
    optional string phone = 3;       // Номер телефона пользователя (опционально)
}

// Ответ на запрос регистрации
message SignUpResponse {
    string user_id = 1;              // Уникальный идентификатор созданного пользователя (UUID)
    string message = 2;              // Сообщение о результате операции
}

// Запрос на аутентификацию пользователя
message LoginRequest {
    string email = 1;                // Email пользователя
    string password = 2;             // Пароль пользователя
}

// Ответ с токенами доступа после успешной аутентификации
message LoginResponse {
    string access_token = 1;         // JWT токен для доступа к защищенным ресурсам
    string refresh_token = 2;        // Токен для обновления access token
    string user_id = 3;              // Идентификатор пользователя (UUID)
    string email = 4;                // Email пользователя
}

// Запрос на обновление токенов доступа
message RefreshTokenRequest {
    string refresh_token = 1;        // Действительный refresh token
}

// Запрос на завершение сессии пользователя
message LogoutRequest {
    string user_id = 1;              // Идентификатор пользователя (UUID)
    string refresh_token = 2;        // Refresh token для инвалидации
}

// User messages
// Запрос на получение информации о пользователе
message GetUserRequest {
    string user_id = 1;              // Идентификатор пользователя (UUID)
}

// Ответ с информацией о пользователе
message GetUserResponse {
    string user_id = 1;                           // Уникальный идентификатор пользователя (UUID)
    string email = 2;                              // Email пользователя
    optional string phone = 3;                     // Номер телефона пользователя
    bool is_active = 4;                            // Флаг активности учетной записи
    SubscriptionStatus subscription_status = 5;     // Текущий статус подписки
    google.protobuf.Timestamp subscription_expires = 6; // Дата истечения подписки
    google.protobuf.Timestamp created_at = 7;       // Дата создания учетной записи
    google.protobuf.Timestamp updated_at = 8;       // Дата последнего обновления
}

// Запрос на обновление данных пользователя
message UpdateUserRequest {
    string user_id = 1;                             // Идентификатор пользователя (UUID)
    optional string email = 2;                      // Новый email пользователя
    optional string phone = 3;                      // Новый номер телефона
    optional bool is_active = 4;                     // Новый статус активности
    optional SubscriptionStatus subscription_status = 5; // Новый статус подписки
    optional google.protobuf.Timestamp subscription_expires = 6; // Новая дата истечения подписки
}

// Ответ после обновления данных пользователя
message UpdateUserResponse {
    string user_id = 1;                           // Идентификатор пользователя (UUID)
    string email = 2;                              // Обновленный email
    optional string phone = 3;                     // Обновленный телефон
    bool is_active = 4;                            // Обновленный статус активности
    SubscriptionStatus subscription_status = 5;     // Обновленный статус подписки
    google.protobuf.Timestamp subscription_expires = 6; // Обновленная дата истечения подписки
    google.protobuf.Timestamp updated_at = 7;       // Дата последнего обновления
}

// Запрос на удаление пользователя
message DeleteUserRequest {
    string user_id = 1;          // Идентификатор пользователя для удаления (UUID)
    bool permanent = 2;          // true - полное удаление, false - мягкое удаление (деактивация)
}

// Profile messages
// Профиль пользователя с персональной информацией
message UserProfile {
    string profile_id = 1;                           // Уникальный идентификатор профиля (UUID)
    string user_id = 2;                               // Идентификатор пользователя (UUID)
    string name = 3;                                   // Имя пользователя
    string surname = 4;                                // Фамилия пользователя
    optional string patronymic = 5;                    // Отчество пользователя
    optional google.protobuf.Timestamp date_of_birth = 6; // Дата рождения
    optional Gender gender = 7;                        // Пол пользователя
    optional int32 height_cm = 8;                      // Рост в сантиметрах (от 50 до 300)
    optional double weight_kg = 9;                     // Вес в килограммах (от 20 до 500)
    optional FitnessGoal fitness_goal = 10;            // Фитнес цель
    optional ExperienceLevel experience_level = 11;     // Уровень опыта
    optional string health_limitations = 12;           // Ограничения по здоровью
    google.protobuf.Timestamp created_at = 13;         // Дата создания профиля
    google.protobuf.Timestamp updated_at = 14;         // Дата последнего обновления профиля
}

// Запрос на создание профиля пользователя
message CreateUserProfileRequest {
    string user_id = 1;                               // Идентификатор пользователя (UUID)
    string name = 2;                                   // Имя пользователя
    string surname = 3;                                // Фамилия пользователя
    optional string patronymic = 4;                    // Отчество пользователя
    optional google.protobuf.Timestamp date_of_birth = 5; // Дата рождения
    optional Gender gender = 6;                        // Пол пользователя
    optional int32 height_cm = 7;                      // Рост в сантиметрах
    optional double weight_kg = 8;                     // Вес в килограммах
    optional FitnessGoal fitness_goal = 9;             // Фитнес цель
    optional ExperienceLevel experience_level = 10;     // Уровень опыта
    optional string health_limitations = 11;           // Ограничения по здоровью
}

// Запрос на получение профиля пользователя
message GetUserProfileRequest {
    string user_id = 1;          // Идентификатор пользователя (UUID)
}

// Запрос на обновление профиля пользователя
message UpdateUserProfileRequest {
    string user_id = 1;                               // Идентификатор пользователя (UUID)
    optional string name = 2;                          // Новое имя
    optional string surname = 3;                       // Новая фамилия
    optional string patronymic = 4;                    // Новое отчество
    optional google.protobuf.Timestamp date_of_birth = 5; // Новая дата рождения
    optional Gender gender = 6;                        // Новый пол
    optional int32 height_cm = 7;                      // Новый рост
    optional double weight_kg = 8;                     // Новый вес
    optional FitnessGoal fitness_goal = 9;             // Новая фитнес цель
    optional ExperienceLevel experience_level = 10;     // Новый уровень опыта
    optional string health_limitations = 11;           // Новые ограничения по здоровью
}

// Запрос на удаление профиля пользователя
message DeleteUserProfileRequest {
    string user_id = 1;          // Идентификатор пользователя (UUID)
}

// Settings messages
// Настройки пользователя
message UserSettings {
    string settings_id = 1;                           // Уникальный идентификатор настроек (UUID)
    string user_id = 2;                               // Идентификатор пользователя (UUID)
    bool notifications_enabled = 3;                    // Включены ли уведомления (по умолчанию true)
    string language = 4;                               // Язык интерфейса (код языка, например "ru", "en")
    string timezone = 5;                               // Часовой пояс пользователя (например "Europe/Moscow")
    PrivacyLevel privacy_level = 6;                     // Уровень приватности профиля
    google.protobuf.Timestamp updated_at = 7;          // Дата последнего обновления настроек
}

// Запрос на получение настроек пользователя
message GetUserSettingsRequest {
    string user_id = 1;          // Идентификатор пользователя (UUID)
}

// Запрос на обновление настроек пользователя
message UpdateUserSettingsRequest {
    string user_id = 1;                               // Идентификатор пользователя (UUID)
    optional bool notifications_enabled = 2;           // Новый статус уведомлений
    optional string language = 3;                      // Новый язык интерфейса
    optional string timezone = 4;                      // Новый часовой пояс
    optional PrivacyLevel privacy_level = 5;           // Новый уровень приватности
}